<!doctype html><html lang="sv"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b0f"><title>PA Strength</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--bg:#080a0e;--p:#151922;--p2:#1d2330;--l:#2d3442;--t:#f5f7fb;--m:#9aa4b5;--g:#e3b84d;--ok:#62d49b;--bad:#ff7777}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#080a0e,#10141c);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
button,input,select,textarea{font:inherit}.wrap{max-width:920px;margin:auto;padding:16px 12px 108px}.view{display:none}.view.active{display:block}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:14px;background:var(--g);color:#181208;display:grid;place-items:center;font-weight:1000}
h1{font-size:22px;margin:0}h2{font-size:20px;margin:0 0 12px}h3{margin:0;font-size:17px}.muted{color:var(--m)}.small{font-size:12px}
.card{background:var(--p);border:1px solid var(--l);border-radius:18px;padding:15px;margin:11px 0;box-shadow:0 12px 35px #0006}.hero{background:linear-gradient(135deg,#1c2230,#2b2518)}
.grid{display:grid;gap:10px}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}.metric{background:var(--p2);border:1px solid var(--l);border-radius:14px;padding:13px}.metric span{display:block;color:var(--m);font-size:12px}.metric b{font-size:23px}
.btn{border:1px solid var(--l);background:var(--p2);color:var(--t);padding:10px 13px;border-radius:11px;font-weight:800}.primary{background:var(--g);color:#181208;border:0}.danger{color:var(--bad)}.btnrow{display:flex;gap:8px;flex-wrap:wrap}
input,select,textarea{width:100%;background:#0d1016;border:1px solid var(--l);color:var(--t);border-radius:10px;padding:10px}label{display:block;color:var(--m);font-size:12px;margin:4px 0}
.progress{height:9px;background:#0d1016;border:1px solid var(--l);border-radius:999px;overflow:hidden}.progress div{height:100%;background:linear-gradient(90deg,var(--g),var(--ok))}
.days{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.day{background:var(--p2);border:1px solid var(--l);color:var(--t);border-radius:12px;padding:12px 6px}.day.done{color:var(--ok);border-color:var(--ok)}
.ex{padding:15px 0;border-top:1px solid var(--l)}.ex:first-of-type{border-top:0}.exh{display:flex;justify-content:space-between;gap:10px}.badge{display:inline-block;margin-top:5px;padding:4px 8px;border-radius:999px;background:#2b2518;color:var(--g);font-size:11px}.suggest{font-size:12px;color:#7fc5ff;margin-top:5px}
.set{display:grid;grid-template-columns:34px 65px 1fr 55px;gap:8px;align-items:center;margin:7px 0}.n{width:31px;height:31px;border-radius:50%;background:var(--p2);display:grid;place-items:center;font-weight:800}.w{text-align:center;font-weight:850}.r{text-align:center}
.ck{appearance:none;width:28px;height:28px;border:2px solid #596276;border-radius:8px;background:#0d1016;padding:0}.ck:checked{background:var(--ok);border-color:var(--ok)}.ck:checked:after{content:"✓";display:grid;place-items:center;color:#082016;font-weight:1000;font-size:20px}
.hist{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid var(--l)}.hist:first-child{border-top:0}
canvas{width:100%;height:230px;background:#0d1016;border:1px solid var(--l);border-radius:12px}.timer{font-size:36px;font-weight:1000;color:var(--g)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.cd{aspect-ratio:1;border:1px solid var(--l);border-radius:9px;display:grid;place-items:center;background:#0d1016;font-size:12px}.cd.done{background:#143021;border-color:var(--ok)}.cd.empty{visibility:hidden}
.tabs{position:fixed;left:0;right:0;bottom:0;background:#080a0eee;backdrop-filter:blur(16px);border-top:1px solid var(--l);padding:8px 7px calc(8px + env(safe-area-inset-bottom));z-index:10}.tabs div{max-width:920px;margin:auto;display:grid;grid-template-columns:repeat(6,1fr);gap:4px}.tab{border:0;background:transparent;color:var(--m);font-size:9px;padding:8px 2px;border-radius:10px}.tab b{display:block;font-size:18px}.tab.active{background:var(--p2);color:var(--g)}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#252c39;border:1px solid var(--l);padding:10px 14px;border-radius:999px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1}
@media(max-width:650px){.two,.three{grid-template-columns:1fr}.set{grid-template-columns:33px 60px 1fr 54px}}
</style></head><body><div class="wrap">
<header><div class="brand"><div class="logo">PA</div><div><h1>PA STRENGTH</h1><div class="small muted">Heavy basics • measurable progress</div></div></div><div id="wp" class="badge">Vecka 1</div></header>
<section id="dash" class="view active"></section><section id="work" class="view"></section><section id="calendar" class="view"></section><section id="stats" class="view"></section><section id="body" class="view"></section><section id="more" class="view"></section>
</div><nav class="tabs"><div>
<button class="tab active" data-v="dash"><b>⌂</b>Översikt</button><button class="tab" data-v="work"><b>🏋</b>Pass</button><button class="tab" data-v="calendar"><b>▦</b>Kalender</button><button class="tab" data-v="stats"><b>↗</b>Utveckling</button><button class="tab" data-v="body"><b>◎</b>Kropp</button><button class="tab" data-v="more"><b>⚙</b>Mer</button>
</div></nav><div id="toast" class="toast"></div>
<script>
const P={A:[["Knäböj","lower","Huvudlyft",210,[4,5],[5,4],[5,3],[3,5]],["Bänkpress","upper","Huvudlyft",180,[4,6],[5,5],[5,3],[3,6]],["Skivstångsrodd","upper","Basövning",150,[4,6],[4,6],[5,5],[3,6]],["Rumänska marklyft","lower","Basövning",150,[3,8],[4,6],[4,5],[2,8]],["Chins","upper","Basövning",120,[3,6],[4,5],[4,4],[2,6]]],B:[["Marklyft","lower","Huvudlyft",240,[3,5],[4,4],[5,2],[2,5]],["Militärpress","upper","Huvudlyft",180,[4,6],[5,4],[5,3],[3,6]],["Frontböj","lower","Basövning",180,[3,6],[4,5],[4,4],[2,6]],["Lutande bänkpress","upper","Basövning",150,[3,8],[4,6],[4,5],[2,8]],["Viktade chins/latsdrag","upper","Basövning",120,[4,6],[4,6],[5,4],[3,6]]],C:[["Pausböj","lower","Huvudlyft",180,[4,5],[5,4],[5,3],[3,5]],["Pausbänk","upper","Huvudlyft",180,[4,5],[5,4],[5,3],[3,5]],["Pendlayrodd","upper","Basövning",150,[4,6],[4,6],[5,5],[3,6]],["Hip thrust","lower","Basövning",150,[3,8],[4,6],[4,5],[2,8]],["Dips","upper","Basövning",120,[3,8],[4,6],[4,5],[2,8]]]};
const D={week:1,day:"A",logs:{},sessions:{},body:[],goals:{"Knäböj":140,"Bänkpress":100,"Marklyft":180},settings:{name:"Pär",upper:2.5,lower:5,start:new Date().toISOString().slice(0,10)},exercise:"Knäböj"};
let S=load(),ti=null,left=0;
function load(){try{let x=JSON.parse(localStorage.getItem("pa-v2")||"null");if(x)return Object.assign(structuredClone(D),x,{settings:Object.assign({},D.settings,x.settings||{})});let o=JSON.parse(localStorage.getItem("styrkelogg-v1")||"null");if(o){let n=structuredClone(D);n.week=o.week||1;n.day=o.selectedDay||"A";n.logs=o.logs||{};n.body=(o.bodyweights||[]).map(x=>({date:x.date,weight:x.value}));localStorage.setItem("pa-v2",JSON.stringify(n));return n}}catch(e){}return structuredClone(D)}
function save(){localStorage.setItem("pa-v2",JSON.stringify(S))}function n(v){return Number(String(v??"").replace(",","."))||0}function k(w,d,e,s){return `${w}|${d}|${e}|${s}`}function b(w){return Math.min(3,Math.floor((w-1)/3))}function pl(ex,w){return ex[4+b(w)]}function del(w){return[4,8,12].includes(w)}
function ents(w,d){return P[d].flatMap((ex,ei)=>Array.from({length:pl(ex,w)[0]},(_,si)=>S.logs[k(w,d,ei,si)]||{done:false,weight:"",reps:pl(ex,w)[1]}))}function comp(w,d){let a=ents(w,d);return[a.filter(x=>x.done).length,a.length]}function done(w,d){let a=ents(w,d);return a.length&&a.every(x=>x.done)}
function erm(w,r){return w*(1+r/30)}function names(){return[...new Set(Object.values(P).flat().map(x=>x[0]))]}function best(name,exclude=""){let m=0;for(let w=1;w<=12;w++)for(let d of["A","B","C"])P[d].forEach((ex,ei)=>{if(ex[0]===name)for(let si=0;si<pl(ex,w)[0];si++){let z=S.logs[k(w,d,ei,si)];if(k(w,d,ei,si)!==exclude&&z?.done)m=Math.max(m,n(z.weight))}});return m}
function bestRM(name,w0=0){let m=0;for(let w=1;w<=12;w++){if(w0&&w!==w0)continue;for(let d of["A","B","C"])P[d].forEach((ex,ei)=>{if(ex[0]===name)for(let si=0;si<pl(ex,w)[0];si++){let z=S.logs[k(w,d,ei,si)];if(z?.done)m=Math.max(m,erm(n(z.weight),n(z.reps)||pl(ex,w)[1]))}})}return m}
function vol(w){let v=0;for(let d of["A","B","C"])P[d].forEach((ex,ei)=>{for(let si=0;si<pl(ex,w)[0];si++){let z=S.logs[k(w,d,ei,si)];if(z?.done)v+=n(z.weight)*(n(z.reps)||pl(ex,w)[1])}});return v}
function sug(ex,ei,d){for(let w=S.week-1;w>=1;w--){let a=[];for(let si=0;si<pl(ex,w)[0];si++){let z=S.logs[k(w,d,ei,si)];if(z?.done&&n(z.weight))a.push(n(z.weight))}if(a.length){let x=Math.min(...a);if(del(S.week))return Math.round(x*.875*2)/2;return a.length===pl(ex,w)[0]?x+(ex[1]==="upper"?S.settings.upper:S.settings.lower):x}}return""}
function date(w,d){let x=new Date(S.settings.start+"T12:00:00");x.setDate(x.getDate()+(w-1)*7+({A:0,B:2,C:4}[d]));return x.toISOString().slice(0,10)}
function toast(t){let x=document.getElementById("toast");x.textContent=t;x.classList.add("show");setTimeout(()=>x.classList.remove("show"),1700)}
function render(){wp.textContent=`Vecka ${S.week}`;dash();work();calendar();stats();body();more()}
function dash(){let pd=["A","B","C"].filter(d=>done(S.week,d)).length,sd=["A","B","C"].reduce((a,d)=>a+comp(S.week,d)[0],0),st=["A","B","C"].reduce((a,d)=>a+comp(S.week,d)[1],0);document.getElementById("dash").innerHTML=`<div class="card hero"><div class="muted small">Välkommen tillbaka</div><h2 style="font-size:27px">${S.settings.name}</h2><div class="muted">${del(S.week)?"Deloadvecka – kvalitet före belastning":"Bygg styrka. Logga allt. Slå gårdagen."}</div><div class="progress" style="margin-top:13px"><div style="width:${st?sd/st*100:0}%"></div></div></div><div class="grid three"><div class="metric"><span>Pass klara</span><b>${pd}/3</b></div><div class="metric"><span>Set klara</span><b>${sd}/${st}</b></div><div class="metric"><span>Volym</span><b>${Math.round(vol(S.week)).toLocaleString("sv-SE")}</b></div></div><div class="card"><label>Programvecka</label><select onchange="S.week=n(this.value);save();render()">${Array.from({length:12},(_,i)=>`<option ${S.week==i+1?"selected":""}>${i+1}</option>`).join("")}</select></div><div class="card"><h2>Veckans pass</h2><div class="days">${["A","B","C"].map(d=>`<button class="day ${done(S.week,d)?"done":""}" onclick="S.day='${d}';save();show('work')"><b>Pass ${d}</b><br><span class="small">${comp(S.week,d)[0]}/${comp(S.week,d)[1]} set</span><br><span class="small">${date(S.week,d)}</span></button>`).join("")}</div></div><div class="card"><h2>Huvudlyft</h2>${["Knäböj","Bänkpress","Marklyft"].map(x=>`<div class="hist"><div><b>${x}</b><div class="small muted">e1RM ${Math.round(bestRM(x))||"–"} kg</div></div><div><span class="small muted">Mål ${S.goals[x]} kg</span><div class="progress" style="width:120px"><div style="width:${Math.min(100,bestRM(x)/S.goals[x]*100)}%"></div></div></div></div>`).join("")}</div>`}
function work(){let d=S.day,[a,z]=comp(S.week,d);document.getElementById("work").innerHTML=`<div class="card"><div class="exh"><div><h2>Pass ${d} • Vecka ${S.week}</h2><div class="muted">${a}/${z} set klara</div></div><select style="width:90px" onchange="S.day=this.value;save();render()">${["A","B","C"].map(x=>`<option ${x===d?"selected":""}>${x}</option>`).join("")}</select></div><div class="progress"><div style="width:${z?a/z*100:0}%"></div></div>${P[d].map((ex,ei)=>exhtml(ex,ei,d)).join("")}<label>Kommentar</label><textarea rows="3" oninput="S.logs['note|${S.week}|${d}']=this.value;save()" placeholder="Teknik, känsla, sömn, smärta...">${S.logs[`note|${S.week}|${d}`]||""}</textarea><div class="grid two"><div><label>Passkänsla 1–10</label><input value="${S.sessions[`${S.week}|${d}`]?.rating||""}" onchange="sf('${S.week}|${d}','rating',this.value)"></div><div><label>Kroppsvikt</label><input value="${S.sessions[`${S.week}|${d}`]?.bw||""}" onchange="sf('${S.week}|${d}','bw',this.value)"></div></div><div class="btnrow" style="margin-top:10px"><button class="btn primary" onclick="finish('${d}')">Markera pass klart</button><button class="btn danger" onclick="clearP('${d}')">Nollställ</button></div></div><div class="card"><h2>Vilotimer</h2><div id="timer" class="timer">${fmt(left)}</div><div class="btnrow"><button class="btn" onclick="start(120)">2:00</button><button class="btn" onclick="start(180)">3:00</button><button class="btn" onclick="start(240)">4:00</button><button class="btn danger" onclick="stop()">Stoppa</button></div></div>`}
function exhtml(ex,ei,d){let p=pl(ex,S.week),sg=sug(ex,ei,d);return `<div class="ex"><div class="exh"><div><h3>${ex[0]}</h3><span class="badge">${ex[2]} • ${p[0]}×${p[1]}${del(S.week)?" • DELOAD":""}</span>${sg!==""?`<div class="suggest">Föreslagen vikt: <b>${sg} kg</b></div>`:""}</div></div>${Array.from({length:p[0]},(_,si)=>{let q=k(S.week,d,ei,si),x=S.logs[q]||{done:false,weight:"",reps:p[1]},pr=x.done&&n(x.weight)>best(ex[0],q);return `<div class="set"><div class="n">${si+1}</div><input class="r" value="${x.reps??p[1]}" inputmode="numeric" onchange="sl('${q}','reps',this.value)"><input class="w" value="${x.weight??""}" inputmode="decimal" placeholder="kg" onchange="sl('${q}','weight',this.value)"><input class="ck" type="checkbox" ${x.done?"checked":""} onchange="sl('${q}','done',this.checked);if(this.checked)start(${ex[3]})"></div>${pr?`<div class="badge" style="color:var(--ok);background:#143021">🏆 Nytt vikt-PR</div>`:""}`}).join("")}</div>`}
function calendar(){let m=S.month||new Date().toISOString().slice(0,7),[y,mo]=m.split("-").map(Number),off=(new Date(y,mo-1,1).getDay()+6)%7,days=new Date(y,mo,0).getDate(),map={};for(let w=1;w<=12;w++)for(let d of["A","B","C"])if(done(w,d))map[date(w,d)]=1;document.getElementById("calendar").innerHTML=`<div class="card"><div class="exh"><h2>Kalender</h2><input type="month" style="width:155px" value="${m}" onchange="S.month=this.value;save();render()"></div><div class="cal">${["M","T","O","T","F","L","S"].map(x=>`<div class="small muted" style="text-align:center">${x}</div>`).join("")}${Array.from({length:off},()=>`<div class="cd empty"></div>`).join("")}${Array.from({length:days},(_,i)=>{let ds=`${y}-${String(mo).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;return `<div class="cd ${map[ds]?"done":""}">${i+1}</div>`}).join("")}</div></div><div class="card"><h2>Genomförda pass</h2>${history()}</div>`}
function history(){let a=[];for(let w=12;w>=1;w--)for(let d of["C","B","A"])if(done(w,d))a.push(`<div class="hist"><div><b>Vecka ${w} • Pass ${d}</b><div class="small muted">${date(w,d)}</div></div><button class="btn" onclick="S.week=${w};S.day='${d}';save();show('work')">Öppna</button></div>`);return a.join("")||`<p class="muted">Inga pass ännu.</p>`}
function stats(){let sel=S.exercise;document.getElementById("stats").innerHTML=`<div class="card"><h2>Styrkeutveckling</h2><select onchange="S.exercise=this.value;save();render()">${names().map(x=>`<option ${x===sel?"selected":""}>${x}</option>`).join("")}</select><canvas id="chart" style="margin-top:10px"></canvas><p class="small muted">Högsta estimerade 1RM per programvecka.</p></div><div class="card"><h2>Personbästa</h2>${names().map(x=>bestRM(x)?`<div class="hist"><span>${x}</span><b>${Math.round(bestRM(x))} kg e1RM</b></div>`:"").join("")||`<p class="muted">Logga ett pass för statistik.</p>`}</div><div class="card"><h2>Veckovolym</h2>${Array.from({length:12},(_,i)=>`<div class="hist"><span>Vecka ${i+1}</span><b>${Math.round(vol(i+1)).toLocaleString("sv-SE")} kg</b></div>`).join("")}</div>`;setTimeout(()=>chart(sel),0)}
function chart(name){let c=document.getElementById("chart");if(!c)return,r=c.getBoundingClientRect(),d=devicePixelRatio||1,W=r.width,H=230,p=35;c.width=W*d;c.height=H*d;let x=c.getContext("2d");x.scale(d,d);let v=Array.from({length:12},(_,i)=>bestRM(name,i+1)||null),mx=Math.max(1,...v.filter(Boolean));x.strokeStyle="#2d3442";x.fillStyle="#9aa4b5";x.font="11px sans-serif";for(let i=0;i<5;i++){let y=p+(H-2*p)*i/4;x.beginPath();x.moveTo(p,y);x.lineTo(W-p,y);x.stroke();x.fillText(Math.round(mx*(1-i/4)),2,y+4)}x.strokeStyle="#e3b84d";x.lineWidth=3;x.beginPath();let st=0;v.forEach((q,i)=>{if(!q)return;let xx=p+(W-2*p)*i/11,yy=H-p-(H-2*p)*q/mx;st?x.lineTo(xx,yy):(x.moveTo(xx,yy),st=1)});x.stroke();v.forEach((q,i)=>{let xx=p+(W-2*p)*i/11;x.fillStyle="#9aa4b5";x.fillText(i+1,xx-3,H-10);if(q){let yy=H-p-(H-2*p)*q/mx;x.fillStyle="#62d49b";x.beginPath();x.arc(xx,yy,5,0,7);x.fill()}})}
function body(){document.getElementById("body").innerHTML=`<div class="card"><h2>Kroppsmått</h2><div class="grid two"><div><label>Datum</label><input id="bd" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><label>Vikt kg</label><input id="bw" inputmode="decimal"></div><div><label>Midja cm</label><input id="wa" inputmode="decimal"></div><div><label>Fettprocent</label><input id="fa" inputmode="decimal"></div></div><button class="btn primary" style="margin-top:10px" onclick="addBody()">Spara</button></div><div class="card"><h2>Historik</h2>${S.body.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(x=>`<div class="hist"><div><b>${x.date}</b><div class="small muted">Midja ${x.waist||"–"} • Fett ${x.fat||"–"}%</div></div><b>${x.weight||"–"} kg</b></div>`).join("")||`<p class="muted">Inga mätningar ännu.</p>`}</div>`}
function more(){document.getElementById("more").innerHTML=`<div class="card"><h2>Profil</h2><div class="grid two"><div><label>Namn</label><input value="${S.settings.name}" onchange="S.settings.name=this.value;save();render()"></div><div><label>Programstart</label><input type="date" value="${S.settings.start}" onchange="S.settings.start=this.value;save();render()"></div></div></div><div class="card"><h2>Mål</h2>${["Knäböj","Bänkpress","Marklyft"].map(x=>`<label>${x} (kg)</label><input value="${S.goals[x]}" onchange="S.goals['${x}']=n(this.value);save();render()">`).join("")}</div><div class="card"><h2>Progression</h2><div class="grid two"><div><label>Överkropp +kg</label><input value="${S.settings.upper}" onchange="S.settings.upper=n(this.value);save();render()"></div><div><label>Underkropp +kg</label><input value="${S.settings.lower}" onchange="S.settings.lower=n(this.value);save();render()"></div></div></div><div class="card"><h2>Data</h2><div class="btnrow"><button class="btn primary" onclick="backup()">Exportera backup</button><label class="btn">Importera<input type="file" accept=".json" style="display:none" onchange="importB(this.files[0])"></label><button class="btn" onclick="csv()">Exportera CSV</button><button class="btn danger" onclick="reset()">Radera allt</button></div></div>`}
function sl(q,f,v){S.logs[q]=Object.assign({},S.logs[q]||{}, {[f]:v});save();render()}function sf(q,f,v){S.sessions[q]=Object.assign({},S.sessions[q]||{}, {[f]:v});save()}function finish(d){P[d].forEach((ex,ei)=>{for(let si=0;si<pl(ex,S.week)[0];si++){let q=k(S.week,d,ei,si);S.logs[q]=Object.assign({reps:pl(ex,S.week)[1],weight:""},S.logs[q]||{},{done:true})}});save();render();toast("Passet är klart ✓")}function clearP(d){if(!confirm("Nollställa passet?"))return;P[d].forEach((ex,ei)=>{for(let si=0;si<pl(ex,S.week)[0];si++)delete S.logs[k(S.week,d,ei,si)]});save();render()}
function addBody(){S.body.push({date:bd.value,weight:n(bw.value)||"",waist:n(wa.value)||"",fat:n(fa.value)||""});save();render();toast("Mätning sparad")}function show(v){document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));document.getElementById(v).classList.add("active");document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.v===v));if(v==="stats")setTimeout(()=>stats(),0);scrollTo(0,0)}document.querySelectorAll(".tab").forEach(x=>x.onclick=()=>show(x.dataset.v))
function start(s){stop();left=s;upd();ti=setInterval(()=>{left--;upd();if(left<=0){stop();navigator.vibrate?.([200,100,200]);toast("Vilan är klar")}},1000)}function stop(){if(ti)clearInterval(ti);ti=null;left=Math.max(0,left);upd()}function upd(){let x=document.getElementById("timer");if(x)x.textContent=fmt(left)}function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`}
function dl(name,text,type){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click()}function backup(){dl("pa-strength-backup.json",JSON.stringify(S,null,2),"application/json")}function importB(f){if(!f)return;let r=new FileReader();r.onload=()=>{try{S=Object.assign(structuredClone(D),JSON.parse(r.result));save();render();toast("Backup importerad")}catch(e){alert("Ogiltig fil")}};r.readAsText(f)}function csv(){let a=[["vecka","datum","pass","övning","set","reps","vikt","klart"]];for(let w=1;w<=12;w++)for(let d of["A","B","C"])P[d].forEach((ex,ei)=>{for(let si=0;si<pl(ex,w)[0];si++){let z=S.logs[k(w,d,ei,si)]||{};a.push([w,date(w,d),d,ex[0],si+1,z.reps??pl(ex,w)[1],z.weight??"",z.done?"ja":"nej"])}});dl("pa-strength.csv",a.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n"),"text/csv")}function reset(){if(confirm("Radera all data?")){localStorage.removeItem("pa-v2");S=structuredClone(D);render()}}
if("serviceWorker"in navigator&&location.protocol.startsWith("http"))navigator.serviceWorker.register("sw.js").catch(()=>{});render();
</script></body></html>
